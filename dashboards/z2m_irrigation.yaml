      # ────── Advanced calibration section ──────
      #
      # Always visible (HA Lovelace has no native collapsible cards
      # without extra resources), but visually subordinated under a
      # clear "set once during initial setup" heading + intro markdown.
      # The user should rarely need to touch these after their first
      # bucket test / measurement.

      - type: grid
        cards:
          - type: heading
            heading: 📐 Advanced calibration (set once during setup)
            heading_style: title
          - type: markdown
            content: |
              **You usually only set these ONCE per zone, then forget
              about them.** They define the zone's geometry and plant
              biology — the daily "more/less" tweak goes through the
              `factor` knob above instead.

              ### Zone area (m²) — "L per mm" internally

              Your zone's effective irrigation area in square metres.
              Because 1 mm of water on 1 m² of ground = exactly **1 L**,
              this number doubles as "litres needed for 1 mm of depth".

              **Set this once** — measure your bed dimensions OR do a
              bucket test (run the valve for 1 min, measure delivered L,
              then `area_m² ≈ delivered_L ÷ flow_mm`). Default `12` = 12 m².

              ### Plant thirst (mm/day) — "base mm" internally

              How much water depth (in mm) the plants in this zone want
              **per day** under neutral weather conditions (no rain,
              average humidity). The calculator scales this up on hot/dry
              days via the dryness factor and subtracts rain.

              **Reference table** (rules of thumb — your local conditions
              and plant maturity will vary):

              | Plant type | Typical mm/day |
              | --- | --- |
              | Succulents / cacti | 0.5 – 1.5 |
              | Established native shrubs (e.g. lilly pilly) | 2 – 4 |
              | Lawn (cool climate) | 3 – 5 |
              | Lawn (warm climate / summer) | 5 – 8 |
              | Vegetable garden (active) | 5 – 7 |
              | Tropical / exotic ornamentals | 6 – 10 |
              | Pots & raised beds | 8 – 12 |

              Default `4` = 4 mm/day, suitable for a cool-climate lawn or
              an established mixed garden bed.

              ---

              **The full formula** (for the curious):

              ```
              dryness  = clamp(0.85 + vpd_kpa / 3, 0.8, 1.5)
              need_mm  = max(0, plant_thirst × dryness − rain_today − 0.7 × forecast_24h)
              litres   = need_mm × zone_area_m² × tweak_factor
              ```

              The `tweak factor` knob in the section above is the daily
              ➖➕ override. The two values below (zone area and plant
              thirst) are the foundation that the daily knob tweaks.

      # Advanced — Front Garden calibration
      - type: grid
        cards:
          - type: heading
            heading: Front Garden — calibration
            heading_style: subtitle
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: |
                  {{ states('sensor.front_garden_zone_l_per_mm') }}
                secondary: Zone area (m²)
                icon: mdi:water-percent
                icon_color: blue
              - type: custom:button-card
                name: "−"
                icon: mdi:minus
                styles:
                  card: [{padding: 12px}, {min-height: 60px}]
                tap_action:
                  action: call-service
                  service: z2m_irrigation.set_zone_l_per_mm
                  data:
                    zone: Front Garden
                    l_per_mm: |
                      [[[
                        const cur = parseFloat(states['sensor.front_garden_zone_l_per_mm'].state) || 12.0;
                        return Math.max(1.0, Math.round((cur - 0.5) * 10) / 10);
                      ]]]
              - type: custom:button-card
                name: "+"
                icon: mdi:plus
                styles:
                  card: [{padding: 12px}, {min-height: 60px}]
                tap_action:
                  action: call-service
                  service: z2m_irrigation.set_zone_l_per_mm
