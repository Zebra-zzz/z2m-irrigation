  # ───────────────────────────────────────────────────────────────────────
  # Tab 4 — Insight
  # ───────────────────────────────────────────────────────────────────────
  - title: Insight
    path: insight
    icon: mdi:chart-box-outline
    type: sections
    max_columns: 2
    sections:

      # Section: 30-day delivery — combined stacked bar chart
      - type: grid
        cards:
          - type: heading
            heading: 30-day delivery
            heading_style: title
          - type: custom:apexcharts-card
            graph_span: 30d
            span:
              end: day
            header:
              show: true
              title: Combined daily totals
              show_states: true
              colorize_states: true
            apex_config:
              chart:
                type: bar
                height: 280
              plotOptions:
                bar:
                  borderRadius: 4
                  columnWidth: 70%
              dataLabels:
                enabled: false
              legend:
                show: false
              xaxis:
                type: datetime
            series:
              - entity: sensor.z2m_irrigation_daily_totals
                name: All zones
                color: "#0d7377"
                data_generator: |
                  const days = entity.attributes.days || [];
                  return days.slice().reverse().map(d => [
                    new Date(d.date + 'T00:00:00').getTime(),
                    d.liters
                  ]);

      # Section: Per-zone leaderboard from daily_totals.zones attribute
      - type: grid
        cards:
          - type: heading
            heading: Per-zone — last 30 days
            heading_style: title
          - type: markdown
            content: |
              {% set zones = state_attr('sensor.z2m_irrigation_daily_totals', 'zones') or [] %}
              {% if zones | length == 0 %}
              _Aggregation cache is empty — waiting for the first refresh._
              {% else %}
              {% set sorted_z = zones | sort(attribute='total_liters', reverse=True) %}
              | Zone | Litres (30d) | Last 24h | Last 7d | Minutes | Sessions |
              | --- | ---: | ---: | ---: | ---: | ---: |
              {% for z in sorted_z -%}
              {%- set slug = z.zone | lower | replace(' ', '_') -%}
              {%- set h24 = states('sensor.' ~ slug ~ '_last_24h') -%}
              {%- set d7 = states('sensor.' ~ slug ~ '_last_7_days') -%}
              | **{{ z.name }}** | {{ z.total_liters }} L | {{ h24 if h24 not in ['unknown','unavailable'] else '—' }} L | {{ d7 if d7 not in ['unknown','unavailable'] else '—' }} L | {{ z.total_minutes }} | {{ z.total_sessions }} |
              {% endfor %}
              {% endif %}

      # Section: Per-zone daily charts (one per discovered valve)
      - type: grid
        cards:
          - type: heading
            heading: Per-zone trend
            heading_style: title
          # v4.0 rc-2 hotfix — the previous version used auto-entities to
          # generate one apexcharts-card per discovered valve via a
          # `series.entity: this.entity_id` placeholder. Auto-entities
          # substitutes top-level `entity:` placeholders cleanly but
          # does NOT reliably walk into nested `series:` arrays, so the
          # render path crashed with "card vertical-stack Error: Invalid
          # configuration". The combined daily chart at the top of
          # this tab + the leaderboard table above cover most of the
          # value; per-zone trend bars are deferred to v4.1 where I'll
          # ship a smarter pattern (likely a single multi-series chart
          # whose series are populated dynamically from
          # `daily_totals.attributes.zones`).
          - type: markdown
            content: |
              **Per-zone trend bars** are deferred to v4.1.

              Until then, the **30-day delivery** chart at the top of
              this tab shows the combined trend across all zones, and
              the **leaderboard table** above shows per-zone totals
              over the same window. For a per-zone time-series view,
              open Developer Tools → Statistics and pick any
              `sensor.<zone>_daily_history` (the `days` attribute
              carries the same data shape).

      # Section: Schedule timeline — last 14 days of fires/skips
      - type: grid
        cards:
          - type: heading
            heading: Schedule timeline
            heading_style: title
          - type: markdown
            content: |
              {% set events = state_attr('sensor.z2m_irrigation_schedule_history', 'events') or [] %}
              {% if events | length == 0 %}
              _No schedule events recorded yet. Events appear here as
              schedules fire or skip._
              {% else %}
              **{{ events | length }}** recent events shown
              ({{ states('sensor.z2m_irrigation_schedule_history') }} total in window).

              {% for e in events[:30] -%}
              {% set dt = (as_datetime(e.at) | as_local) if e.at else None %}
              {% if e.kind == 'fired' -%}
              ✅ **{{ dt.strftime('%a %d %b %H:%M') if dt else e.at }}** — fired
              **{{ e.schedule_name }}**
              ({{ (e.zones or []) | length }} zones, {{ e.total_liters or '?' }} L,
              {{ e.trigger or 'scheduled' }})
              {% else -%}
              ⏭ **{{ dt.strftime('%a %d %b %H:%M') if dt else e.at }}** — skipped
              **{{ e.schedule_name }}** ({{ e.outcome }})
              {% endif -%}
              {% endfor %}
              {% endif %}

      # Section: Per-zone avg flow (a smaller diagnostic strip)
      - type: grid
        cards:
          - type: heading
            heading: Avg flow per zone
            heading_style: title
          - type: markdown
            content: |
              Rolling average flow rate over the most recent completed
              sessions. A drifting value over time signals filter clog,
              valve wear, or pressure changes.
          # v4.0 rc-2 hotfix — hardcoded list (same auto-entities
          # reliability rationale as the other sections).
          - type: glance
            show_state: true
            show_name: true
            entities:
              - entity: sensor.front_garden_avg_flow_7d
                name: Front Garden
              - entity: sensor.lilly_pilly_avg_flow_7d
                name: Lilly Pilly
              - entity: sensor.back_garden_avg_flow_7d
                name: Back Garden
              - entity: sensor.mains_taps_avg_flow_7d
                name: Mains Taps

  # ───────────────────────────────────────────────────────────────────────
  # Tab 5 — Log (v4.0-rc-3, F-I)
  #
  # Renders `sensor.z2m_irrigation_session_log.attributes.sessions` as a
  # markdown table. Reads the most recent 200 sessions from the SQLite
  # session history. No recorder access needed.
  # ───────────────────────────────────────────────────────────────────────
  - title: Log
    path: log
    icon: mdi:format-list-bulleted
    type: sections
    max_columns: 1
    sections:

      - type: grid
        cards:
          - type: heading
            heading: Session log
            heading_style: title
          - type: markdown
            content: |
              Recent irrigation sessions (most recent first). Sourced
              directly from the integration's SQLite session history,
              capped at 200 entries. Each row shows when the session
              ran, what triggered it, the target parameter that was
              set, and the final delivered values when the valve closed.

              {% set sessions = state_attr('sensor.z2m_irrigation_session_log', 'sessions') or [] %}
              {% if sessions | count == 0 %}
              _No sessions recorded yet._
              {% else %}
              **{{ sessions | count }}** sessions in the buffer.

              | When | Zone | Trigger | Target | Delivered | Duration | Avg flow | OK |
              | --- | --- | --- | ---: | ---: | ---: | ---: | :---: |
              {% for s in sessions[:50] -%}
              {%- set ended = (as_datetime(s.ended_at) | as_local) if s.ended_at else None -%}
              {%- set when = ended.strftime('%a %d %b %H:%M') if ended else (s.ended_at or '?') -%}
              {%- set trig = s.trigger_type or '?' -%}
              {%- set target = '' -%}
              {%- if s.target_liters %}{% set target = (s.target_liters | round(1)) ~ ' L' %}
              {%- elif s.target_minutes %}{% set target = (s.target_minutes | round(1)) ~ ' min' %}
              {%- else %}{% set target = '—' %}
              {%- endif %}
              {%- set delivered = (s.volume_liters | round(2)) ~ ' L' if s.volume_liters is not none else '—' -%}
              {%- set duration = (s.duration_minutes | round(1)) ~ ' min' if s.duration_minutes is not none else '—' -%}
              {%- set flow = (s.avg_flow_lpm | round(2)) ~ ' L/min' if s.avg_flow_lpm is not none else '—' -%}
              {%- set ok = '✅' if s.completed_successfully else '⚠' -%}
              | {{ when }} | {{ s.name or s.valve }} | {{ trig }} | {{ target }} | {{ delivered }} | {{ duration }} | {{ flow }} | {{ ok }} |
              {% endfor %}

              Showing the most recent **{{ [sessions | count, 50] | min }}** of **{{ sessions | count }}** entries. Buffer cap is 200.
              {% endif %}
