# ─────────────────────────────────────────────────────────────────────────────
# Z2M Irrigation — v4.0 dashboard
#
# Pre-built Lovelace dashboard for the z2m_irrigation custom integration.
# Wires every entity exposed by alpha-1 through alpha-4 into a single
# editorial-Apple-clean, four-tab UI:
#
#   1. Today    — Hero status, calculator card, per-zone live tiles
#   2. Schedule — List of stored schedules + per-row controls + run-now
#   3. Setup    — Per-zone config editors + global thresholds + master pause
#   4. Insight  — 30-day delivery chart, per-zone breakdown, timeline
#
# Dependencies (HACS frontend cards — install before importing):
#   * button-card           (templated buttons + state-aware styling)
#   * mushroom              (template, entity, chips, slider cards)
#   * auto-entities         (per-zone repetition)
#   * apexcharts-card       (Insight tab charts)
#   * mini-graph-card       (inline sparklines)
#   * stack-in-card         (visual grouping)
#   * card-mod              (CSS injection)
#   * layout-card           (multi-column layouts)
#
# Install: see dashboards/README.md in this repo for the import steps.
# ─────────────────────────────────────────────────────────────────────────────

title: Z2M Irrigation

# ─────────────────────────────────────────────────────────────────────────────
# Shared button-card templates
# ─────────────────────────────────────────────────────────────────────────────

button_card_templates:
  # Base — typography, spacing, and the ink palette every other template
  # extends from. Centralizes the look so a single edit re-themes the
  # whole dashboard.
  z2m_base:
    color_type: card
    show_icon: false
    show_name: false
    show_label: false
    show_state: false
    styles:
      card:
        - background: var(--card-background-color)
        - border-radius: 18px
        - padding: 22px
        - box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 1px rgba(0,0,0,0.02)
        - border: 1px solid rgba(127,127,127,0.10)
        - color: var(--primary-text-color)
        - font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif
        - -webkit-font-smoothing: antialiased
        - text-rendering: optimizeLegibility
        - transition: all 200ms ease

  # Hero card — large status surface with 5 visual states. The state is
  # resolved by reading the binary_sensor.z2m_irrigation_panic and
  # any_running entities plus the next_run_summary sensor.
  z2m_hero:
    template: z2m_base
    triggers_update:
      - binary_sensor.z2m_irrigation_panic
      - binary_sensor.z2m_irrigation_any_running
      - sensor.z2m_irrigation_next_run
      - sensor.z2m_irrigation_active_session
      - switch.z2m_irrigation_master_enable
    styles:
      card:
        - padding: 30px
        - min-height: 220px
      custom_fields:
        accent:
          - position: absolute
          - top: 22px
          - left: 30px
          - font-size: 11px
          - font-weight: 600
          - letter-spacing: 0.12em
          - text-transform: uppercase
          - opacity: 0.55
        title:
          - position: absolute
          - top: 50px
          - left: 30px
          - right: 30px
          - font-size: 32px
          - font-weight: 600
          - line-height: 1.15
          - letter-spacing: -0.01em
        sub:
          - position: absolute
          - bottom: 28px
          - left: 30px
          - right: 30px
          - font-size: 14px
          - opacity: 0.7
          - line-height: 1.4
        bar:
          - position: absolute
          - left: 0
          - top: 0
          - width: 4px
          - height: 100%
          - background: var(--accent)
          - border-radius: 18px 0 0 18px
    # v4.0 rc-2 hotfix — every state read is null-guarded. Earlier
    # versions assumed the entities were always loaded, which crashed
    # the Hero card with `Cannot read properties of undefined` during
    # the brief window after HA restart when integrations are still
    # warming up.
    custom_fields:
      accent: >-
        [[[
          const get = (id) => states[id];
          const isOn = (id) => { const s = get(id); return s && s.state === 'on'; };
          const isOff = (id) => { const s = get(id); return s && s.state === 'off'; };
          if (isOn('binary_sensor.z2m_irrigation_panic')) return 'panic';
          if (isOn('binary_sensor.z2m_irrigation_any_running')) return 'running';
          if (isOff('switch.z2m_irrigation_master_enable')) return 'paused';
          const next = get('sensor.z2m_irrigation_next_run');
          if (!next || next.state === 'no_schedule' || next.state === 'unknown' || next.state === 'unavailable')
            return 'idle';
          return 'scheduled';
        ]]]
      # v4.0 rc-2 hotfix iter 2 — title and sub now use
      # `binary_sensor.z2m_irrigation_any_running.attributes.running_valves`
      # which is the authoritative live list of all currently-active
      # valves. Earlier versions read `sensor.z2m_irrigation_active_session`
      # which only tracked one valve at a time and missed parallel
      # manual runs (D7).
      title: >-
        [[[
          const get = (id) => states[id];
          const isOn = (id) => { const s = get(id); return s && s.state === 'on'; };
          const isOff = (id) => { const s = get(id); return s && s.state === 'off'; };
          if (isOn('binary_sensor.z2m_irrigation_panic'))
            return '🚨 Kill the water pump';
          if (isOn('binary_sensor.z2m_irrigation_any_running')) {
            const ar = get('binary_sensor.z2m_irrigation_any_running');
            const valves = (ar && ar.attributes && ar.attributes.running_valves) || [];
            if (valves.length === 0) return 'Running';
            if (valves.length === 1) return 'Running ' + valves[0].name;
            if (valves.length === 2) return 'Running ' + valves[0].name + ' + ' + valves[1].name;
            return 'Running ' + valves.length + ' zones';
          }
          if (isOff('switch.z2m_irrigation_master_enable'))
            return 'Paused';
          const next = get('sensor.z2m_irrigation_next_run');
          if (!next || next.state === 'no_schedule' || next.state === 'unknown' || next.state === 'unavailable')
            return 'No schedule yet';
          const d = new Date(next.state);
          if (isNaN(d.getTime())) return 'Idle';
          const opts = { weekday: 'long', hour: '2-digit', minute: '2-digit' };
          return 'Next run ' + d.toLocaleString(undefined, opts);
        ]]]
      sub: >-
        [[[
          const get = (id) => states[id];
          const isOn = (id) => { const s = get(id); return s && s.state === 'on'; };
          const isOff = (id) => { const s = get(id); return s && s.state === 'off'; };
          if (isOn('binary_sensor.z2m_irrigation_panic')) {
            const p = get('binary_sensor.z2m_irrigation_panic');
            const attrs = (p && p.attributes) || {};
            return 'Reason: ' + (attrs.reason || 'unknown') +
                   ' · clear via z2m_irrigation.clear_panic once water is confirmed off.';
          }
          if (isOn('binary_sensor.z2m_irrigation_any_running')) {
            const ar = get('binary_sensor.z2m_irrigation_any_running');
            const valves = (ar && ar.attributes && ar.attributes.running_valves) || [];
            if (valves.length === 0) return 'Tap a zone tile below to stop it.';
            // Per-valve breakdown: name + delivered + flow rate
            const lines = valves.map(v => {
              const slug = v.valve.toLowerCase().replace(/ /g, '_');
              const flow = states['sensor.' + slug + '_flow'];
              const remL = states['sensor.' + slug + '_remaining_liters'];
              const used = (v.session_liters != null) ? v.session_liters.toFixed(1) : '—';
              const flowStr = (flow && flow.state && flow.state !== 'unknown')
                ? parseFloat(flow.state).toFixed(2) + ' L/min' : '';
              const remStr = (remL && remL.state && remL.state !== 'unknown')
                ? ' · ' + parseFloat(remL.state).toFixed(1) + ' L left' : '';
              return v.name + ': ' + used + ' L' +
                     (flowStr ? ' · ' + flowStr : '') + remStr;
            });
            return lines.join(' • ') + ' · Tap any zone tile below to stop.';
          }
          if (isOff('switch.z2m_irrigation_master_enable'))
            return 'Scheduler paused. Toggle Master Enable to resume.';
          const next = get('sensor.z2m_irrigation_next_run');
          const a = (next && next.attributes) || {};
          if (!a.schedule_name) return 'Create a schedule on the Schedule tab to get started.';
          const liters = a.estimated_total_liters != null
            ? a.estimated_total_liters.toFixed(1) + ' L estimated'
            : '';
          return a.schedule_name + ' · ' + ((a.zones || []).length) + ' zones' +
                 (liters ? ' · ' + liters : '');
        ]]]
      bar: ""
    style: |
      ha-card {
        --accent: var(--primary-color);
      }
      ha-card[data-accent="panic"] {
        --accent: #c0392b;
        background: linear-gradient(0deg, rgba(192,57,43,0.06), rgba(192,57,43,0.02));
      }
      ha-card[data-accent="running"] { --accent: #0d7377; }
      ha-card[data-accent="paused"]  { --accent: #888; }
      ha-card[data-accent="idle"]    { --accent: #888; }
      ha-card[data-accent="scheduled"] { --accent: #0d7377; }
    extra_styles: |
      [[[
        return `ha-card[data-accent='${this.shadowRoot.querySelector('#accent')?.innerText || ''}']`;
      ]]]

  # Per-zone tile — used by auto-entities on the Today tab to render one
  # card per discovered valve. Reads the per-zone session sensors that
  # alpha-1 + alpha-3 + alpha-4 expose.
  z2m_zone_tile:
    template: z2m_base
    tap_action:
      action: more-info
    styles:
      card:
        - padding: 18px
        - min-height: 140px
      grid:
        - grid-template-areas: '"name status" "metric metric" "sub sub"'
        - grid-template-columns: 1fr auto
        - row-gap: 6px
      custom_fields:
        name:
          - grid-area: name
          - font-size: 16px
          - font-weight: 600
        status:
          - grid-area: status
          - font-size: 11px
          - font-weight: 600
          - text-transform: uppercase
          - letter-spacing: 0.08em
          - color: var(--accent)
        metric:
          - grid-area: metric
          - font-size: 28px
          - font-weight: 600
          - margin-top: 8px
          - line-height: 1.1
        sub:
          - grid-area: sub
          - font-size: 12px
          - opacity: 0.6
          - margin-top: 4px

# ─────────────────────────────────────────────────────────────────────────────
# Views
# ─────────────────────────────────────────────────────────────────────────────

views:

  # ───────────────────────────────────────────────────────────────────────
  # Tab 1 — Today
  # ───────────────────────────────────────────────────────────────────────
  - title: Today
    path: today
    icon: mdi:calendar-today
    type: sections
    max_columns: 2
    sections:

      # Section 1: Hero status card
      - type: grid
        cards:
          - type: custom:button-card
            template: z2m_hero

          # Quick chips: skip-today, run smart now, master enable
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Run smart cycle now
                secondary: All zones in cycle
                icon: mdi:play-circle
                icon_color: teal
                tap_action:
                  action: call-service
                  service: z2m_irrigation.run_smart_now
                  data: {}
                  confirmation:
                    text: Start a smart cycle right now across all zones marked in_smart_cycle?

              - type: custom:mushroom-template-card
                primary: Skip today
                secondary: >-
                  {% if state_attr('sensor.z2m_irrigation_next_run', 'skip_today') %}
                    Currently skipping
                  {% else %}
                    Stop today's runs
                  {% endif %}
                icon: mdi:debug-step-over
                icon_color: >-
                  {% if state_attr('sensor.z2m_irrigation_next_run', 'skip_today') %}
                    orange
                  {% else %}
                    grey
                  {% endif %}
                tap_action:
                  action: call-service
                  service: >-
                    {% if state_attr('sensor.z2m_irrigation_next_run', 'skip_today') %}
                      z2m_irrigation.clear_skip_today
                    {% else %}
                      z2m_irrigation.skip_today
                    {% endif %}

              - type: custom:mushroom-entity-card
                entity: switch.z2m_irrigation_master_enable
                name: Master enable
                icon: mdi:power
                icon_color: >-
                  {% if is_state('switch.z2m_irrigation_master_enable', 'on') %}
                    teal
                  {% else %}
                    grey
                  {% endif %}

      # Section 2: Calculator card — editorial prose-style breakdown
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Today's calculation
              {% set tc = states('sensor.z2m_irrigation_today_calculation') %}
              {% set attrs = state_attr('sensor.z2m_irrigation_today_calculation', 'zones') or [] %}
              {% if tc in ['unknown', 'unavailable', None] %}
                _Calculator hasn't run yet — waiting for the first valve to come online or for `z2m_irrigation.recalculate_now` to be called._
              {% else %}
              **{{ tc }} L** total across **{{ state_attr('sensor.z2m_irrigation_today_calculation', 'runnable_zones') }}**
              of **{{ state_attr('sensor.z2m_irrigation_today_calculation', 'total_zones') }}** zones.

              {%- set snap = state_attr('sensor.z2m_irrigation_today_calculation', 'vpd_snapshot_kpa') -%}
              {%- set avg = state_attr('sensor.z2m_irrigation_today_calculation', 'vpd_24h_avg_kpa') -%}
              {%- set samples = state_attr('sensor.z2m_irrigation_today_calculation', 'vpd_24h_sample_count') or 0 -%}
              {%- set effective = state_attr('sensor.z2m_irrigation_today_calculation', 'vpd_kpa_effective') -%}
              **VPD {{ effective | round(2) if effective is not none else '—' }} kPa** —
              {%- if avg is not none and samples > 0 %}
                **24h average** ({{ samples }} sample{{ 's' if samples != 1 else '' }} in buffer; live now: **{{ snap | round(2) if snap else '—' }} kPa**)
              {%- else %}
                _snapshot only — 24h buffer is filling (1 sample per 15 min, 96 needed for full coverage)_
              {%- endif %}

              · rain today **{{ state_attr('sensor.z2m_irrigation_today_calculation', 'rain_today_mm_effective') | round(1) }} mm**
              · forecast 24h **{{ state_attr('sensor.z2m_irrigation_today_calculation', 'rain_forecast_24h_mm_effective') | round(1) }} mm**
              · dryness factor **{{ state_attr('sensor.z2m_irrigation_today_calculation', 'dryness') | round(2) }}**

              ---

              {% for z in attrs -%}
              {% if z.skipped -%}
              ~~**{{ z.zone }}** — skipped ({{ z.skip_reason }})~~
              {% else -%}
              **{{ z.zone }}** — {{ z.liters }} L
              {% endif -%}
              {% endfor %}

              _Detailed formula breakdown is on the **Setup tab → Calculation details**._
              {% endif %}
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Recalculate now
                secondary: Force fresh weather read
                icon: mdi:refresh
                icon_color: teal
                tap_action:
                  action: call-service
                  service: z2m_irrigation.recalculate_now

      # Section 3: Per-zone live tiles
      #
      # v4.0 rc-2 hotfix iteration 2:
      #   - Switch entity_id: was `switch.<zone>`, actual is
      #     `switch.<zone>_valve` (D6).
      #   - Metric: was always showing `_last_run_liters` (end-of-session
      #     data). Now LIVE: `_session_used` while running, falling back
      #     to `_last_run_liters` when idle (D9).
      #   - Sub-line: shows live flow + remaining when running, last-run
      #     timestamp when idle (D9).
      #   - Tap action: when the valve is ON, tap fires
      #     `switch.turn_off` with a confirmation dialog so manual runs
      #     are stoppable from the dashboard (D8). When OFF, tap opens
      #     the more-info dialog as before.
      - type: grid
        cards:
          - type: heading
            heading: Zones
            heading_style: title
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: z2m_zone_tile
                entity: switch.front_garden_valve
                tap_action:
                  action: call-service
                  service: |
                    [[[ return entity && entity.state === 'on'
                          ? 'switch.turn_off'
                          : 'homeassistant.update_entity'; ]]]
                  target:
                    entity_id: switch.front_garden_valve
                  confirmation:
                    text: |
                      [[[ return entity && entity.state === 'on'
                            ? 'Stop Front Garden now?'
                            : null; ]]]
                custom_fields:
                  name: Front Garden
                  status: |
                    [[[ return entity && entity.state === 'on' ? 'RUNNING' : 'closed'; ]]]
                  metric: |
                    [[[
                      const isOn = entity && entity.state === 'on';
                      if (isOn) {
                        const live = states['sensor.front_garden_session_used'];
                        if (live && live.state && live.state !== 'unknown')
                          return parseFloat(live.state).toFixed(1) + ' L';
                      }
                      const s = states['sensor.front_garden_last_run_liters'];
                      return (s && s.state && s.state !== 'unknown' && s.state !== 'unavailable')
                        ? s.state + ' L' : '— L';
                    ]]]
                  sub: |
                    [[[
                      const isOn = entity && entity.state === 'on';
                      if (isOn) {
                        const flow = states['sensor.front_garden_flow'];
                        const remL = states['sensor.front_garden_remaining_liters'];
                        const flowStr = (flow && flow.state && flow.state !== 'unknown')
                          ? parseFloat(flow.state).toFixed(2) + ' L/min' : '—';
                        const remStr = (remL && remL.state && remL.state !== 'unknown')
                          ? ' · ' + parseFloat(remL.state).toFixed(1) + ' L left'
                          : '';
                        return '🔵 ' + flowStr + remStr + ' · TAP TO STOP';
                      }
                      const at = states['sensor.front_garden_last_run_at'];
                      if (!at || !at.state || at.state === 'unknown' || at.state === 'unavailable')
                        return 'No history yet';
                      const d = new Date(at.state);
                      if (isNaN(d.getTime())) return at.state;
                      return 'Last run ' + d.toLocaleString(undefined,
                        { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    ]]]

              - type: custom:button-card
                template: z2m_zone_tile
                entity: switch.lilly_pilly_valve
                tap_action:
                  action: call-service
                  service: |
                    [[[ return entity && entity.state === 'on'
                          ? 'switch.turn_off'
                          : 'homeassistant.update_entity'; ]]]
                  target:
                    entity_id: switch.lilly_pilly_valve
                  confirmation:
                    text: |
                      [[[ return entity && entity.state === 'on'
                            ? 'Stop Lilly Pilly now?'
                            : null; ]]]
                custom_fields:
                  name: Lilly Pilly
                  status: |
                    [[[ return entity && entity.state === 'on' ? 'RUNNING' : 'closed'; ]]]
                  metric: |
                    [[[
                      const isOn = entity && entity.state === 'on';
                      if (isOn) {
                        const live = states['sensor.lilly_pilly_session_used'];
                        if (live && live.state && live.state !== 'unknown')
                          return parseFloat(live.state).toFixed(1) + ' L';
                      }
                      const s = states['sensor.lilly_pilly_last_run_liters'];
                      return (s && s.state && s.state !== 'unknown' && s.state !== 'unavailable')
                        ? s.state + ' L' : '— L';
                    ]]]
                  sub: |
                    [[[
                      const isOn = entity && entity.state === 'on';
                      if (isOn) {
                        const flow = states['sensor.lilly_pilly_flow'];
                        const remL = states['sensor.lilly_pilly_remaining_liters'];
                        const flowStr = (flow && flow.state && flow.state !== 'unknown')
                          ? parseFloat(flow.state).toFixed(2) + ' L/min' : '—';
                        const remStr = (remL && remL.state && remL.state !== 'unknown')
                          ? ' · ' + parseFloat(remL.state).toFixed(1) + ' L left'
                          : '';
                        return '🔵 ' + flowStr + remStr + ' · TAP TO STOP';
                      }
                      const at = states['sensor.lilly_pilly_last_run_at'];
                      if (!at || !at.state || at.state === 'unknown' || at.state === 'unavailable')
                        return 'No history yet';
                      const d = new Date(at.state);
                      if (isNaN(d.getTime())) return at.state;
                      return 'Last run ' + d.toLocaleString(undefined,
                        { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    ]]]

              - type: custom:button-card
                template: z2m_zone_tile
                entity: switch.back_garden_valve
                tap_action:
                  action: call-service
                  service: |
                    [[[ return entity && entity.state === 'on'
                          ? 'switch.turn_off'
                          : 'homeassistant.update_entity'; ]]]
                  target:
                    entity_id: switch.back_garden_valve
                  confirmation:
                    text: |
                      [[[ return entity && entity.state === 'on'
                            ? 'Stop Back Garden now?'
                            : null; ]]]
                custom_fields:
                  name: Back Garden
                  status: |
                    [[[ return entity && entity.state === 'on' ? 'RUNNING' : 'closed'; ]]]
                  metric: |
                    [[[
                      const isOn = entity && entity.state === 'on';
                      if (isOn) {
                        const live = states['sensor.back_garden_session_used'];
                        if (live && live.state && live.state !== 'unknown')
                          return parseFloat(live.state).toFixed(1) + ' L';
                      }
                      const s = states['sensor.back_garden_last_run_liters'];
                      return (s && s.state && s.state !== 'unknown' && s.state !== 'unavailable')
                        ? s.state + ' L' : '— L';
                    ]]]
                  sub: |
                    [[[
                      const isOn = entity && entity.state === 'on';
                      if (isOn) {
                        const flow = states['sensor.back_garden_flow'];
                        const remL = states['sensor.back_garden_remaining_liters'];
                        const flowStr = (flow && flow.state && flow.state !== 'unknown')
                          ? parseFloat(flow.state).toFixed(2) + ' L/min' : '—';
                        const remStr = (remL && remL.state && remL.state !== 'unknown')
                          ? ' · ' + parseFloat(remL.state).toFixed(1) + ' L left'
                          : '';
                        return '🔵 ' + flowStr + remStr + ' · TAP TO STOP';
                      }
                      const at = states['sensor.back_garden_last_run_at'];
                      if (!at || !at.state || at.state === 'unknown' || at.state === 'unavailable')
                        return 'No history yet';
                      const d = new Date(at.state);
                      if (isNaN(d.getTime())) return at.state;
                      return 'Last run ' + d.toLocaleString(undefined,
                        { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    ]]]

              - type: custom:button-card
                template: z2m_zone_tile
                entity: switch.mains_taps_valve
                tap_action:
                  action: call-service
                  service: |
                    [[[ return entity && entity.state === 'on'
                          ? 'switch.turn_off'
                          : 'homeassistant.update_entity'; ]]]
                  target:
                    entity_id: switch.mains_taps_valve
                  confirmation:
                    text: |
                      [[[ return entity && entity.state === 'on'
                            ? 'Stop Mains Taps now?'
                            : null; ]]]
                custom_fields:
                  name: Mains Taps
                  status: |
                    [[[ return entity && entity.state === 'on' ? 'RUNNING' : 'closed'; ]]]
                  metric: |
                    [[[
                      const isOn = entity && entity.state === 'on';
                      if (isOn) {
                        const live = states['sensor.mains_taps_session_used'];
                        if (live && live.state && live.state !== 'unknown')
                          return parseFloat(live.state).toFixed(1) + ' L';
                      }
                      const s = states['sensor.mains_taps_last_run_liters'];
                      return (s && s.state && s.state !== 'unknown' && s.state !== 'unavailable')
                        ? s.state + ' L' : '— L';
                    ]]]
                  sub: |
                    [[[
                      const isOn = entity && entity.state === 'on';
                      if (isOn) {
                        const flow = states['sensor.mains_taps_flow'];
                        const remL = states['sensor.mains_taps_remaining_liters'];
                        const flowStr = (flow && flow.state && flow.state !== 'unknown')
                          ? parseFloat(flow.state).toFixed(2) + ' L/min' : '—';
                        const remStr = (remL && remL.state && remL.state !== 'unknown')
                          ? ' · ' + parseFloat(remL.state).toFixed(1) + ' L left'
                          : '';
                        return '🔵 ' + flowStr + remStr + ' · TAP TO STOP';
                      }
                      const at = states['sensor.mains_taps_last_run_at'];
                      if (!at || !at.state || at.state === 'unknown' || at.state === 'unavailable')
                        return 'No history yet';
                      const d = new Date(at.state);
                      if (isNaN(d.getTime())) return at.state;
                      return 'Last run ' + d.toLocaleString(undefined,
                        { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    ]]]

      # Section 4: Manual run — both volume and time sliders per zone (F-F)
      #
      # Per-zone layout: zone name heading, then two sliders side-by-side
      # (volume L and time min), then a stop button row with one button
      # per zone that's only shown when that zone is currently running
      # (D8). Tap the slider to start a run, tap the stop button to
      # interrupt it.
      - type: grid
        cards:
          - type: heading
            heading: Manual run
            heading_style: title
          - type: markdown
            content: |
              Each zone has two sliders: **L** sends a fixed volume
              (`cyclic_quantitative_irrigation`, hardware closes at target);
              **min** sends a fixed duration (`cyclic_timed_irrigation`).
              All software guardrails apply to both. Tap a slider to
              commit. **Stop a run** by tapping the running tile above OR
              the stop button below.

          # Front Garden
          - type: markdown
            content: "##### Front Garden"
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.front_garden_run_for_liters
                display_mode: slider
                name: Volume (L)
              - type: custom:mushroom-number-card
                entity: number.front_garden_run_for_minutes
                display_mode: slider
                name: Time (min)

          # Lilly Pilly
          - type: markdown
            content: "##### Lilly Pilly"
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.lilly_pilly_run_for_liters
                display_mode: slider
                name: Volume (L)
              - type: custom:mushroom-number-card
                entity: number.lilly_pilly_run_for_minutes
                display_mode: slider
                name: Time (min)

          # Back Garden
          - type: markdown
            content: "##### Back Garden"
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.back_garden_run_for_liters
                display_mode: slider
                name: Volume (L)
              - type: custom:mushroom-number-card
                entity: number.back_garden_run_for_minutes
                display_mode: slider
                name: Time (min)

          # Mains Taps
          - type: markdown
            content: "##### Mains Taps"
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.mains_taps_run_for_liters
                display_mode: slider
                name: Volume (L)
              - type: custom:mushroom-number-card
                entity: number.mains_taps_run_for_minutes
                display_mode: slider
                name: Time (min)

          # Stop buttons — one per zone, all visible at all times for
          # the simplest UX. Each calls switch.turn_off on the
          # corresponding _valve entity. (Conditional cards that hide
          # when the valve is off were considered, but always-visible
          # is more discoverable and the confirmation dialog catches
          # accidental taps.)
          - type: markdown
            content: "##### 🛑 Stop a running zone"
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Front Garden
                secondary: Stop
                icon: mdi:stop-circle
                icon_color: red
                tap_action:
                  action: call-service
                  service: switch.turn_off
                  target:
                    entity_id: switch.front_garden_valve
                  confirmation:
                    text: Stop Front Garden valve now?
              - type: custom:mushroom-template-card
                primary: Lilly Pilly
                secondary: Stop
                icon: mdi:stop-circle
                icon_color: red
                tap_action:
                  action: call-service
                  service: switch.turn_off
                  target:
                    entity_id: switch.lilly_pilly_valve
                  confirmation:
                    text: Stop Lilly Pilly valve now?
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Back Garden
                secondary: Stop
                icon: mdi:stop-circle
                icon_color: red
                tap_action:
                  action: call-service
                  service: switch.turn_off
                  target:
                    entity_id: switch.back_garden_valve
                  confirmation:
                    text: Stop Back Garden valve now?
              - type: custom:mushroom-template-card
                primary: Mains Taps
                secondary: Stop
                icon: mdi:stop-circle
                icon_color: red
                tap_action:
                  action: call-service
                  service: switch.turn_off
                  target:
                    entity_id: switch.mains_taps_valve
                  confirmation:
                    text: Stop Mains Taps valve now?

          # Global "stop ALL running" — single button that calls
          # switch.turn_off on all 4 valves at once. Useful as a
          # panic-button alternative.
          - type: custom:mushroom-template-card
            primary: 🛑 STOP ALL RUNNING
            secondary: Turn off all 4 valves immediately
            icon: mdi:alert-octagon
            icon_color: red
            tap_action:
              action: call-service
              service: switch.turn_off
              target:
                entity_id:
                  - switch.front_garden_valve
                  - switch.lilly_pilly_valve
                  - switch.back_garden_valve
                  - switch.mains_taps_valve
